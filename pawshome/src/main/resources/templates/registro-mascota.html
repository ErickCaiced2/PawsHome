<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrar mascota | PawsHome</title>
    <link rel="stylesheet" th:href="@{/css/estilosGenerales.css}">
    <link rel="stylesheet" th:href="@{/css/registro-mascota.css}">
</head>
<body class="pagina-registro-mascota">
<main class="registro-contenedor">
    <header class="registro-encabezado">
        <a class="marca" th:href="@{/}" aria-label="PawsHome">
            <span class="marca-icono" aria-hidden="true">P</span>
            <span>PawsHome</span>
        </a>
        <h1>Registrar mascota</h1>
        <p>Completa la informacion basica para publicar una mascota disponible.</p>
    </header>

    <form class="tarjeta-formulario"
          th:action="@{/mascotas}"
          th:object="${mascotaForm}"
          method="post"
          enctype="multipart/form-data"
          novalidate>
        <h2>Datos de la mascota</h2>

        <div class="resumen-errores" th:if="${#fields.hasAnyErrors() or imagenError != null}">
            Corrige los errores indicados antes de continuar.
        </div>

        <div class="rejilla-formulario">
            <div class="grupo-campo">
                <label for="nombre">Nombre</label>
                <input id="nombre"
                       type="text"
                       th:field="*{nombre}"
                       th:classappend="${#fields.hasErrors('nombre')} ? 'campo-invalido' : ''"
                       th:aria-invalid="${#fields.hasErrors('nombre')}"
                       th:aria-describedby="${#fields.hasErrors('nombre')} ? 'nombre-error' : null"
                       maxlength="50"
                       oninput="this.value=this.value.replace(/[^a-zA-ZáéíóúÁÉÍÓÚüÜñÑ\s\-]/g,'')"
                       required>
                <span id="nombre-error"
                      class="error-campo"
                      th:if="${#fields.hasErrors('nombre')}"
                      th:errors="*{nombre}"></span>
            </div>

            <div class="grupo-campo">
                <label for="especie">Especie</label>
                <input id="especie"
                       type="text"
                       th:field="*{especie}"
                       th:classappend="${#fields.hasErrors('especie')} ? 'campo-invalido' : ''"
                       th:aria-invalid="${#fields.hasErrors('especie')}"
                       th:aria-describedby="${#fields.hasErrors('especie')} ? 'especie-error' : null"
                       maxlength="40"
                       oninput="this.value=this.value.replace(/[^a-zA-ZáéíóúÁÉÍÓÚüÜñÑ\s]/g,'')"
                       required>
                <span id="especie-error"
                      class="error-campo"
                      th:if="${#fields.hasErrors('especie')}"
                      th:errors="*{especie}"></span>
            </div>

            <div class="grupo-campo">
                <label for="raza">Raza <span>(opcional)</span></label>
                <input id="raza"
                       type="text"
                       th:field="*{raza}"
                       th:classappend="${#fields.hasErrors('raza')} ? 'campo-invalido' : ''"
                       th:aria-invalid="${#fields.hasErrors('raza')}"
                       th:aria-describedby="${#fields.hasErrors('raza')} ? 'raza-error' : null"
                       maxlength="60"
                       oninput="this.value=this.value.replace(/[^a-zA-ZáéíóúÁÉÍÓÚüÜñÑ\s\-]/g,'')">
                <span id="raza-error"
                      class="error-campo"
                      th:if="${#fields.hasErrors('raza')}"
                      th:errors="*{raza}"></span>
            </div>

            <div class="grupo-campo">
                <label for="edadAproximada">Edad aproximada (en años)</label>
                <input id="edadAproximada"
                       type="text"
                       th:field="*{edadAproximada}"
                       th:classappend="${#fields.hasErrors('edadAproximada')} ? 'campo-invalido' : ''"
                       th:aria-invalid="${#fields.hasErrors('edadAproximada')}"
                       th:aria-describedby="${#fields.hasErrors('edadAproximada')} ? 'edadAproximada-error' : null"
                       maxlength="4"
                       inputmode="decimal"
                       placeholder="Ej: 2 o 0,5"
                       oninput="this.value=this.value.replace(/[^0-9,]/g,'')"
                       required>
                <span id="edadAproximada-error"
                      class="error-campo"
                      th:if="${#fields.hasErrors('edadAproximada')}"
                      th:errors="*{edadAproximada}"></span>
            </div>

            <div class="grupo-campo">
                <label for="sexo">Sexo</label>
                <select id="sexo"
                        th:field="*{sexo}"
                        th:classappend="${#fields.hasErrors('sexo')} ? 'campo-invalido' : ''"
                        th:aria-invalid="${#fields.hasErrors('sexo')}"
                        th:aria-describedby="${#fields.hasErrors('sexo')} ? 'sexo-error' : null"
                        required>
                    <option value="">-- Selecciona --</option>
                    <option value="Macho">Macho</option>
                    <option value="Hembra">Hembra</option>
                </select>
                <span id="sexo-error"
                      class="error-campo"
                      th:if="${#fields.hasErrors('sexo')}"
                      th:errors="*{sexo}"></span>
            </div>

            <div class="grupo-campo grupo-campo-ancho">
                <label for="descripcion">Descripcion</label>
                <textarea id="descripcion"
                          th:field="*{descripcion}"
                          th:classappend="${#fields.hasErrors('descripcion')} ? 'campo-invalido' : ''"
                          th:aria-invalid="${#fields.hasErrors('descripcion')}"
                          th:aria-describedby="${#fields.hasErrors('descripcion')} ? 'descripcion-error' : null"
                          maxlength="1000"
                          placeholder="Describe el temperamento, historia y necesidades especiales de la mascota"
                          required></textarea>
                <span id="descripcion-error"
                      class="error-campo"
                      th:if="${#fields.hasErrors('descripcion')}"
                      th:errors="*{descripcion}"></span>
            </div>

            <!-- Carga de imágenes -->
            <div class="grupo-campo grupo-campo-ancho">
                <label for="imagenes">
                    Fotos de la mascota <span>(mínimo 3 · JPG, PNG o WEBP · máx. 5 MB c/u)</span>
                </label>

                <div id="zona-carga"
                     class="zona-carga"
                     th:classappend="${imagenError != null} ? 'campo-invalido' : ''">
                    <input id="imagenes"
                           type="file"
                           name="imagenes"
                           accept="image/jpeg,image/png,image/webp"
                           multiple
                           required>
                    <p class="zona-carga-texto">Arrastra tus fotos aquí o haz clic para seleccionarlas</p>
                </div>

                <span id="imagenes-contador" class="ayuda-campo"></span>
                <span class="error-campo" th:if="${imagenError != null}" th:text="${imagenError}"></span>

                <div id="imagenes-preview" class="imagenes-preview"></div>
            </div>
        </div>

        <div class="acciones-registro">
            <a class="boton boton-secundario" th:href="@{/}">Cancelar</a>
            <button class="boton boton-primario" type="submit">Registrar mascota</button>
        </div>
    </form>

    <a th:href="@{/}" class="volver-inicio">← Regresar al inicio</a>
</main>

<script>
    (function () {
        const input = document.getElementById('imagenes');
        const contador = document.getElementById('imagenes-contador');
        const preview = document.getElementById('imagenes-preview');
        const TIPOS_VALIDOS = ['image/jpeg', 'image/png', 'image/webp'];
        const MAX_BYTES = 5 * 1024 * 1024;
        let archivosAcumulados = [];

        function obtenerErrores(archivos) {
            let errores = [];

            archivos.forEach(function (archivo) {
                if (!TIPOS_VALIDOS.includes(archivo.type)) {
                    errores.push(archivo.name + ': formato no permitido');
                    return;
                }
                if (archivo.size > MAX_BYTES) {
                    errores.push(archivo.name + ': supera 5 MB');
                }
            });

            return errores;
        }

        function obtenerArchivosValidos(archivos) {
            return archivos.filter(function (f) {
                return TIPOS_VALIDOS.includes(f.type) && f.size <= MAX_BYTES;
            });
        }

        function sincronizarInputConAcumulado() {
            const dataTransfer = new DataTransfer();

            archivosAcumulados.forEach(function (archivo) {
                dataTransfer.items.add(archivo);
            });

            input.files = dataTransfer.files;
        }

        function renderizarPreview() {
            preview.innerHTML = '';
            const errores = obtenerErrores(archivosAcumulados);
            const archivosValidos = obtenerArchivosValidos(archivosAcumulados);

            archivosValidos.forEach(function (archivo, i) {
                const reader = new FileReader();
                reader.onload = function (e) {
                    const wrapper = document.createElement('div');
                    wrapper.className = 'imagen-preview-item';
                    wrapper.style.position = 'relative';
                    const img = document.createElement('img');
                    img.src = e.target.result;
                    img.alt = 'Imagen ' + (i + 1);
                    const botonEliminar = document.createElement('button');
                    botonEliminar.type = 'button';
                    botonEliminar.textContent = '×';
                    botonEliminar.style.background = 'white';
                    botonEliminar.style.border = 'none';
                    botonEliminar.style.borderRadius = '50%';
                    botonEliminar.style.width = '2rem';
                    botonEliminar.style.height = '2rem';
                    botonEliminar.style.cursor = 'pointer';
                    botonEliminar.style.fontSize = '1rem';
                    botonEliminar.style.display = 'flex';
                    botonEliminar.style.alignItems = 'center';
                    botonEliminar.style.justifyContent = 'center';
                    botonEliminar.style.boxShadow = '0 1px 4px rgba(0,0,0,0.15)';
                    botonEliminar.style.position = 'absolute';
                    botonEliminar.style.top = '0.5rem';
                    botonEliminar.style.right = '0.5rem';
                    botonEliminar.style.color = '#c0392b';
                    botonEliminar.addEventListener('click', function () {
                        const indiceAcumulado = archivosAcumulados.indexOf(archivo);

                        if (indiceAcumulado !== -1) {
                            archivosAcumulados.splice(indiceAcumulado, 1);
                        }

                        sincronizarInputConAcumulado();
                        renderizarPreview();
                    });
                    const label = document.createElement('span');
                    label.textContent = i === 0 ? 'Portada' : 'Foto ' + (i + 1);
                    wrapper.appendChild(img);
                    wrapper.appendChild(botonEliminar);
                    wrapper.appendChild(label);
                    preview.appendChild(wrapper);
                };
                reader.readAsDataURL(archivo);
            });

            contador.textContent = archivosAcumulados.length + ' imagen(es) seleccionada(s)' +
                (errores.length > 0 ? ' - ' + errores.join(', ') : '');
            contador.style.color = archivosValidos.length >= 3 ? '#2e7d32' : '#c62828';
        }

        input.addEventListener('change', function () {
            const nuevosArchivos = Array.from(this.files);
            nuevosArchivos.forEach(function (archivo) {
                const yaExiste = archivosAcumulados.some(function (archivoAcumulado) {
                    return archivoAcumulado.name === archivo.name;
                });

                if (!yaExiste) {
                    archivosAcumulados.push(archivo);
                }
            });

            sincronizarInputConAcumulado();
            const errores = obtenerErrores(archivosAcumulados);
            const validas = archivosAcumulados.length;

            contador.textContent = validas + ' imagen(es) seleccionada(s)' +
                (errores.length > 0 ? ' · ' + errores.join(', ') : '');
            contador.style.color = validas >= 3 ? '#2e7d32' : '#c62828';
            renderizarPreview();
        });

        document.querySelector('form').addEventListener('submit', function (e) {
            const archivos = obtenerArchivosValidos(archivosAcumulados);
            if (archivos.length < 3) {
                e.preventDefault();
                contador.textContent = 'Debes seleccionar al menos 3 imágenes válidas antes de enviar';
                contador.style.color = '#c62828';
                input.focus();
                return;
            }

            sincronizarInputConAcumulado();
        });
    })();
</script>
</body>
</html>
