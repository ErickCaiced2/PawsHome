trigger:
- main

pool:
  name: 'PipelinePaws' # Tu agente local que ya funciona perfectamente

variables:
  # Nombre de la conexión de servicio que creaste en el Paso 2
  azureServiceConnection: 'ConexionAzureAppService'
  # El nombre exacto de tu Web App en el portal de Azure
  webAppName: 'pawshome-app'

steps:
# 1. Compilar el código y generar el archivo .war
- task: Maven@4
  displayName: 'Compilar y empaquetar WAR (Spring Boot)'
  inputs:
    mavenPomFile: 'pawshome/pom.xml'
    options: '-DskipTests' 
    publishJUnitResults: false
    javaHomeOption: 'Path'
    jdkDirectory: 'C:\Program Files\Java\jdk-26.0.1'
    mavenVersionOption: 'Path'
    mavenDirectory: 'C:\Program Files\apache-maven-3.9.16'

# 2. Desplegar el archivo .war en Azure App Service
- task: AzureWebApp@1
  displayName: 'Desplegar en Azure Web App'
  inputs:
    azureSubscription: '$(azureServiceConnection)'
    appType: 'webAppLinux' # Cambia a 'webApp' si elegiste Windows en el portal
    appName: 'PawsHome'
    # Busca el archivo .war generado por Maven dentro de la carpeta target
    package: '$(System.DefaultWorkingDirectory)/pawshome/target/pawshome-*.jar'