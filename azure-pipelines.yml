trigger:
- main
- Develop

pool:
  name: 'PipelinePaws' # Tu agente local en Windows

variables:
  # El nombre exacto de la conexión de servicio que creaste en Azure DevOps
  azureServiceConnection: 'ConexionAzureAppService'
  # El nombre exacto de tu Web App tal como aparece en el portal de Azure (PawsHome)
  webAppName: 'PawsHome' 

steps:
# 1. Compilar el código y generar el archivo empaquetado
- task: Maven@4
  displayName: 'Compilar y empaquetar (Spring Boot)'
  inputs:
    mavenPomFile: 'pawshome/pom.xml'
    goals: 'clean package' # Agregamos 'clean package' para asegurar una compilación limpia
    options: '-DskipTests' 
    publishJUnitResults: false
    javaHomeOption: 'Path'
    jdkDirectory: 'C:\Program Files\Java\jdk-26.0.1'
    mavenVersionOption: 'Path'
    mavenDirectory: 'C:\Program Files\apache-maven-3.9.16'

# 2. Desplegar el archivo en Azure App Service
- task: AzureWebApp@1
  displayName: 'Desplegar en Azure Web App'
  inputs:
    azureSubscription: '$(azureServiceConnection)'
    appType: 'webAppLinux' # Mantener 'webAppLinux' ya que tu entorno en Azure es Linux
    appName: '$(webAppName)'
    # CORRECCIÓN: Apunta al archivo .war (o .jar si corresponde) usando comodines correctamente
    package: '$(System.DefaultWorkingDirectory)/pawshome/target/*.war'